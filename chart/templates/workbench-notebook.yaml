apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: {{ .Values.workbench.name }}
  namespace: {{ .Values.projectName }}
  labels:
    app: {{ .Values.workbench.name }}
    app.kubernetes.io/name: {{ .Values.workbench.name }}
    app.kubernetes.io/managed-by: Helm
    opendatahub.io/dashboard: "true"
  annotations:
    notebooks.opendatahub.io/display-name: {{ .Values.workbench.displayName | quote }}
spec:
  template:
    spec:
      serviceAccountName: default

      initContainers:
        - name: clone-notebooks
          image: registry.access.redhat.com/ubi9/ubi:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "Installing git..."
              dnf install -y git

              echo "Preparing workspace..."
              mkdir -p {{ .Values.notebooks.destinationPath }}

              echo "Cloning notebooks repo..."

              {{- if .Values.git.privateRepo }}
              GIT_USERNAME=$(cat /etc/git-secret/username)
              GIT_TOKEN=$(cat /etc/git-secret/token)

              git clone --branch {{ .Values.notebooks.branch }} \
                https://${GIT_USERNAME}:${GIT_TOKEN}@{{ .Values.notebooks.repoUrl }} \
                /tmp/notebook-repo
              {{- else }}
              git clone --branch {{ .Values.notebooks.branch }} \
                {{ .Values.notebooks.repoUrl }} \
                /tmp/notebook-repo
              {{- end }}

              echo "Copying notebooks..."
              if [ -d "/tmp/notebook-repo/{{ .Values.notebooks.sourcePath }}" ]; then
                cp -rn /tmp/notebook-repo/{{ .Values.notebooks.sourcePath }}/* {{ .Values.notebooks.destinationPath }}/
              else
                echo "Source path not found: /tmp/notebook-repo/{{ .Values.notebooks.sourcePath }}"
                exit 1
              fi

              echo "Fixing permissions..."
              chgrp -R 0 /opt/app-root/src
              chmod -R g+rwX /opt/app-root/src

              echo "Notebook import completed."

          volumeMounts:
            - name: workbench-storage
              mountPath: /opt/app-root/src

            {{- if .Values.git.privateRepo }}
            - name: git-secret
              mountPath: /etc/git-secret
              readOnly: true
            {{- end }}

      containers:
        - name: {{ .Values.workbench.name }}
          image: {{ .Values.workbench.image }}
          imagePullPolicy: IfNotPresent

          workingDir: /opt/app-root/src

          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP

          env:
            - name: NOTEBOOK_ARGS
              value: |
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.allow_origin='*'
                --ServerApp.ip='0.0.0.0'

          resources:
            requests:
              cpu: {{ .Values.workbench.resources.requests.cpu | quote }}
              memory: {{ .Values.workbench.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.workbench.resources.limits.cpu | quote }}
              memory: {{ .Values.workbench.resources.limits.memory | quote }}

          volumeMounts:
            - name: workbench-storage
              mountPath: /opt/app-root/src

      volumes:
        - name: workbench-storage
          persistentVolumeClaim:
            claimName: {{ .Values.workbench.pvc.name }}

        {{- if .Values.git.privateRepo }}
        - name: git-secret
          secret:
            secretName: {{ .Values.workbench.name }}-git-secret
        {{- end }}
