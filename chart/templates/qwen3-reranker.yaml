---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: qwen3-reranker
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/runtime-version: v0.13.0
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: vLLM CPU (x86) ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cpu-x86-runtime-template
    openshift.io/display-name: vLLM CPU (x86) ServingRuntime for KServe
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  multiModel: false
  supportedModelFormats:
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: registry.redhat.io/rhaiis/vllm-cpu-rhel9@sha256:f05e773647dddd37ec6c2215cb14bec87e4ab5a7d37f2e110d16cd92355427d3
      imagePullPolicy: IfNotPresent
      command:
        - python
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --port=8080
        - --model=/mnt/models
        - --served-model-name={{.Name}}
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      ports:
        - containerPort: 8080
          protocol: TCP

---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-reranker
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    serving.kserve.io/stop: "false"
    security.opendatahub.io/enable-auth: "false"
    openshift.io/display-name: qwen3-reranker
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/model-type: generative
spec:
  predictor:
    automountServiceAccountToken: false
    minReplicas: 1
    maxReplicas: 1
    deploymentStrategy:
      type: RollingUpdate

    model:
      runtime: qwen3-reranker

      modelFormat:
        name: vLLM

      storageUri: oci://quay.io/asoliman/qwen3-reranker-0.6b-seq-cls-modelcar:latest

      args:
        - --model=/mnt/models
        - --runner=pooling
        - --convert=classify
        - --dtype=float32
        - --max-model-len=1024
        - --served-model-name=qwen3-reranker
        - --max-num-seqs=8
        - --max-num-batched-tokens=1024

      env:
        - name: VLLM_CPU_KVCACHE_SPACE
          value: "4"

      resources:
        requests:
          cpu: "8"
          memory: 16Gi
        limits:
          cpu: "12"
          memory: 20Gi
