---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  annotations:
    opendatahub.io/apiProtocol: REST
    opendatahub.io/runtime-version: v0.13.0
    opendatahub.io/serving-runtime-scope: global
    opendatahub.io/template-display-name: vLLM CPU (x86) ServingRuntime for KServe
    opendatahub.io/template-name: vllm-cpu-x86-runtime-template
    openshift.io/display-name: vLLM CPU (x86) ServingRuntime for KServe
  
  name: qwen3-reranker

  
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    opendatahub.io/kserve-runtime: vllm
    prometheus.io/path: /metrics
    prometheus.io/port: '8080'
  containers:
    - args:
        - '--port=8080'
        - '--model=/mnt/models'
        - '--served-model-name={{.Name}}'
      command:
        - python
        - '-m'
        - vllm.entrypoints.openai.api_server
      env:
        - name: HF_HOME
          value: /tmp/hf_home
      image: 'registry.redhat.io/rhaiis/vllm-cpu-rhel9@sha256:f05e773647dddd37ec6c2215cb14bec87e4ab5a7d37f2e110d16cd92355427d3'
      name: kserve-container
      ports:
        - containerPort: 8080
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: vLLM

---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    serving.kserve.io/stop: 'false'
    security.opendatahub.io/enable-auth: 'false'

    
    openshift.io/description: ''
    openshift.io/display-name: qwen3-reranker
    serving.kserve.io/deploymentMode: RawDeployment
    opendatahub.io/model-type: generative
  
  name: qwen3-reranker
  spec:
    predictor:
      apiVersion: serving.kserve.io/v1beta1
       
  labels:
    
    opendatahub.io/dashboard: 'true'
   
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: RollingUpdate
    maxReplicas: 1
    minReplicas: 1
    model:
      args:
        - '--model=/mnt/models'
        - '--runner=pooling'
        - '--convert=classify'
        - '--dtype=float32'
        - '--max-model-len=1024'
        - '--served-model-name=qwen3-reranker'
        - '--max-num-seqs=8'
        - '--max-num-batched-tokens=1024'
      env:
        - name: VLLM_CPU_KVCACHE_SPACE
          value: '4'
      modelFormat:
        name: vLLM
      name: ''
      resources:
        limits:
          cpu: '12'
          memory: 20Gi
        requests:
          cpu: '8'
          memory: 16Gi
      runtime: qwen3-reranker
      storageUri: 'oci://quay.io/asoliman/qwen3-reranker-0.6b-seq-cls-modelcar:latest'
